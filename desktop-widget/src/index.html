<!doctype html>
<html lang="he" dir="rtl" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shifty</title>
  </head>

  <body>
    <div class="card">
      <!-- hover controls: close · theme · minimize-to-tray -->
      <div class="w-controls">
        <button class="w-btn" id="w-close" aria-label="סגור" title="סגור">
          <svg class="ico" viewBox="0 0 24 24"><path d="M7 7l10 10M17 7L7 17" stroke-linecap="round"/></svg>
        </button>
        <button class="w-btn" id="w-min" aria-label="מזער למגש" title="מזער למגש">
          <svg class="ico" viewBox="0 0 24 24"><path d="M6 13.5h12" stroke-linecap="round"/></svg>
        </button>
        <button class="w-btn" id="w-theme" aria-label="ערכת נושא" title="ערכת נושא">
          <svg class="ico ico-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.6" fill="currentColor" stroke="none"/><g stroke-linecap="round"><path d="M12 2.6v2.3M12 19.1v2.3M4.6 4.6l1.6 1.6M17.8 17.8l1.6 1.6M2.6 12h2.3M19.1 12h2.3M4.6 19.4l1.6-1.6M17.8 6.2l1.6-1.6"/></g></svg>
          <svg class="ico ico-moon" viewBox="0 0 24 24"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>
        </button>
        <button class="w-btn" id="w-web" aria-label="פתח באתר" title="פתח את Shifty באתר">
          <svg class="ico" viewBox="0 0 24 24"><path d="M14 5h5v5" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 5l-8 8" stroke-linecap="round"/><path d="M18 13.5v5A1.5 1.5 0 0 1 16.5 20h-9A1.5 1.5 0 0 1 6 18.5v-9A1.5 1.5 0 0 1 7.5 8h5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <!-- shown until signed in -->
      <div class="w-signin" id="w-signin" style="display:none">
        <button class="btn" id="w-signin-btn">התחבר עם Google</button>
      </div>

      <!-- the live widget bar (whole bar drags the borderless window) -->
      <div class="pip-bar" id="w-bar" data-tauri-drag-region style="display:none">
        <div class="pip-cap working" id="w-cap"><span class="pip-dot"></span><span id="w-status">טוען…</span></div>
        <div class="pip-main">
          <div class="pip-time" id="w-time">00:00:00</div>
          <div class="pip-money">
            <div class="pip-pay" id="w-pay"></div>
            <div class="pip-proj" id="w-proj"></div>
          </div>
        </div>
        <div class="pip-track"><div class="pip-fill" id="w-fill"></div></div>
        <div class="pip-foot"><span id="w-foot-a"></span><span id="w-foot-b"></span></div>
      </div>
    </div>

    <script src="lib/format.js"></script>
    <script src="lib/holidays.js"></script>
    <script src="lib/calc.js"></script>
    <script src="lib/store.js"></script>
    <script src="lib/supabase.js"></script>
    <script src="main.js"></script>
  </body>
</html>
