<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f4f5f7" id="theme-color-meta" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Shifty" />
  <title>Shifty</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="preload" href="assets/fonts/heebo-hebrew.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="assets/fonts/heebo-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="app" id="app">
    <!-- Header -->
    <header class="app-header" id="app-header">
      <button class="header-btn" id="header-action" aria-label="פעולה"></button>
      <h1 class="header-title" id="header-title">Shifty</h1>
      <button class="header-btn" id="theme-toggle" aria-label="החלף ערכת נושא">
        <svg class="ico ico-sun" viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="4.5"/><g stroke-linecap="round"><path d="M12 2.5v2.5M12 19v2.5M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M2.5 12H5M19 12h2.5M4.6 19.4l1.8-1.8M17.6 6.4l1.8-1.8"/></g></svg>
        <svg class="ico ico-moon" viewBox="0 0 24 24" width="22" height="22"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>
      </button>
    </header>

    <!-- Main scroll area -->
    <main class="app-main" id="view-root"><!-- views render here --></main>

    <!-- Bottom navigation -->
    <nav class="tabbar" id="tabbar">
      <button class="tab" data-view="now">
        <svg class="ico" viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3.2"/></svg>
        <span>עכשיו</span>
      </button>
      <button class="tab" data-view="shifts">
        <svg class="ico" viewBox="0 0 24 24" width="24" height="24"><path d="M8 6.5h12M8 12h12M8 17.5h12" stroke-linecap="round"/><circle cx="4.2" cy="6.5" r="1.1" fill="currentColor" stroke="none"/><circle cx="4.2" cy="12" r="1.1" fill="currentColor" stroke="none"/><circle cx="4.2" cy="17.5" r="1.1" fill="currentColor" stroke="none"/></svg>
        <span>משמרות</span>
      </button>
      <button class="tab" data-view="calendar">
        <svg class="ico" viewBox="0 0 24 24" width="24" height="24"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><path d="M3.5 9.5h17M8 3.5v3M16 3.5v3" stroke-linecap="round"/><circle cx="8" cy="13" r="1.05" fill="currentColor" stroke="none"/><circle cx="12" cy="13" r="1.05" fill="currentColor" stroke="none"/><circle cx="16" cy="13" r="1.05" fill="currentColor" stroke="none"/><circle cx="8" cy="16.5" r="1.05" fill="currentColor" stroke="none"/><circle cx="12" cy="16.5" r="1.05" fill="currentColor" stroke="none"/></svg>
        <span>לוח</span>
      </button>
      <button class="tab" data-view="settings">
        <svg class="ico" viewBox="0 0 24 24" width="24" height="24"><path d="M6 8h12M6 12h12M6 16h12" stroke-linecap="round"/><circle cx="9" cy="8" r="2" fill="var(--bg)"/><circle cx="15" cy="16" r="2" fill="var(--bg)"/></svg>
        <span>הגדרות</span>
      </button>
    </nav>
  </div>

  <!-- Modal host -->
  <div class="modal-host" id="modal-host" hidden></div>
  <!-- Second modal layer — a picker can stack on top of an open sheet -->
  <div class="modal-host modal-host-top" id="modal-host-2" hidden></div>
  <!-- Toast host -->
  <div class="toast-host" id="toast-host"></div>

  <script src="assets/js/format.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/holidays.js"></script>
  <script src="assets/js/calc.js"></script>
  <script src="assets/js/vendor/supabase.js"></script>
  <script src="assets/js/cloud.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
